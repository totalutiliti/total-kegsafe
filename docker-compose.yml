version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: kegsafe-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: kegsafe_dev
    ports:
      - '5439:5432'
    volumes:
      - kegsafe_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  kegsafe_pgdata:
