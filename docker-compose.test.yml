name: kegsafe-test

services:
  postgres-test:
    image: postgres:16-alpine
    container_name: kegsafe-db-test
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: kegsafe_test
    ports:
      - '5440:5432'
    volumes:
      - kegsafe_test_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  kegsafe_test_pgdata:
